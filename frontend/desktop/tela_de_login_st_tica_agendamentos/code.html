<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Stética Agendamentos</title>

                        "primary-container": "#dcae96",

                        "surface-dim": "#dadada",
                        "on-background": "#1a1c1c",

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
/* Burnt Cement Texture Simulation */
.burnt-cement {
    background-color: #dadada;
    /* surface-dim */
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDwuz8TrLDhkFpAaJ_AcUrIWTVXABO2_u-rS5R9yZxTJH6MKtZUW1yPpauwTqv3KPMK9NIvqMCr6j8XFHg3i6dKiljL4Oxb4OA3RkRRBXycxHCgm2KYkD7ewFzaL-k1KlYrwMilVLeL1UNpOB7Nh0f-HAR1uc2DGUxgEDbz0wdvF1o9OOtzqJ84JCPHOogh2WKrYbahyH3cyDJn-lhvc42OA7KkKWbKfeAPZJcpLf1leqzoM0UWWONq6aWADo4n_6UvpiWq3AmYfekx);
    background-blend-mode: multiply
    }
.dusty-pink-gradient {
    background: linear-gradient(45deg, #7a5642, #dcae96)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface-variant selection:bg-primary-container selection:text-on-primary-container">
<!-- Login Container: Centered Layout -->
<main class="min-h-screen flex items-center justify-center p-6 burnt-cement" data-alt="minimalist industrial interior with polished concrete walls and soft warm natural lighting casting gentle shadows">
<!-- Content Card -->
<section class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_-12px_40px_rgba(122,86,66,0.06)] overflow-hidden">
<!-- Branding Header -->
<div class="px-10 pt-16 pb-8 text-center">
<div class="flex flex-col items-center gap-4 mb-10">
<div class="w-16 h-16 rounded-full flex items-center justify-center dusty-pink-gradient text-white shadow-lg">
<span class="material-symbols-outlined text-3xl" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div class="space-y-1">
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface">Aura Agendamentos</h1>
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 font-semibold">Exclusividade &amp; Bem-Estar</p>
</div>
</div>
<h2 class="font-headline text-xl font-bold text-on-surface-variant mb-2">Bem-vindo à sua clínica</h2>
<p class="font-body text-sm text-on-surface-variant/70">Acesse sua agenda profissional e gestão de clientes.</p>
</div>
<!-- Login Form -->
<form class="px-10 pb-16 space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant px-1" for="email">Email Profissional</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-1 focus:ring-primary-container/40 focus:bg-surface-container-lowest text-on-surface transition-all placeholder:text-outline-variant font-medium" id="email" placeholder="exemplo@clinica.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant" for="password">Senha</label>
<a class="font-label text-[10px] uppercase tracking-widest font-bold text-primary hover:text-on-tertiary-container transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg focus:ring-1 focus:ring-primary-container/40 focus:bg-surface-container-lowest text-on-surface transition-all placeholder:text-outline-variant font-medium" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-4 px-6 rounded-full shadow-md shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                        Entrar
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Assistance -->
<div class="pt-8 text-center">
<p class="font-body text-xs text-on-surface-variant/50">
                        Não possui uma conta? 
                        <a class="text-primary font-bold hover:underline decoration-primary-container/50 underline-offset-4" href="#">Contatar suporte</a>
</p>
</div>
</form>
<!-- Footer Branding -->
<div class="bg-surface-container-low py-4 px-10 text-center">
<p class="font-headline text-[11px] font-bold text-on-surface-variant tracking-tight">Stética Agendamentos © 2024</p>
</div>
</section>
<!-- Decorative Elements for "Editorial" Feel -->
<div class="fixed top-12 left-12 hidden lg:block opacity-20 pointer-events-none">
<span class="font-headline text-[12rem] font-extrabold leading-none tracking-tighter text-on-surface-variant/10 select-none">AURA</span>
</div>
<div class="fixed bottom-12 right-12 hidden lg:block text-right opacity-20 pointer-events-none">
<p class="font-headline text-lg font-bold text-on-surface-variant">01 / ESTÉTICA</p>
<div class="w-24 h-1 bg-primary-container mt-2 ml-auto"></div>
</div>
</main>
</body></html>
